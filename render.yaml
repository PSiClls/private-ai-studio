services:
  - type: web
    name: private-ai-studio-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.cloud.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app
    disk:
      name: studio-data
      mountPath: /root/.private-ai-studio
      sizeGB: 1
