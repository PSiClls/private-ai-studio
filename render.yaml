services:
  - type: web
    name: private-ai-studio-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app
      - key: APP_NAME
        value: Private AI Studio
    disk:
      name: studio-data
      mountPath: /root/.private-ai-studio
      sizeGB: 1
